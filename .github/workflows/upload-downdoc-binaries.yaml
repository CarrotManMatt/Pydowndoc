name: Upload downdoc executable binaries

"on":
    workflow_call: ~
    workflow_dispatch: ~

concurrency:  # yamllint disable-line rule:key-ordering
    cancel-in-progress: true
    group: upload-downdoc-binaries-${{github.event.pull_request.number || github.ref}}

permissions:
    contents: none  # Reset default permissions to none

jobs:
    upload-downdoc-binaries:
        container: ${{fromJSON(matrix.container)}}  # zizmor: ignore[unpinned-images]
        name: Upload ${{matrix.display_os}} ${{matrix.display_architecture}} downdoc executable binary
        runs-on: ${{matrix.runner}}
        strategy:
            matrix:
                include:
                    - architecture: x86-64
                      container: "{\"image\": \"quay.io/pypa/manylinux_2_28_x86_64\"}"
                      display_architecture: x86_64
                      display_os: Linux
                      downdoc_architecture: x64
                      downdoc_binary_suffix: ""
                      downdoc_os: linux
                      os: linux
                      runner: ubuntu-latest

                    - architecture: x86-64
                      container: "null"
                      display_architecture: x86_64
                      display_os: Windows
                      downdoc_architecture: x64
                      downdoc_binary_suffix: .exe
                      downdoc_os: win
                      os: windows
                      runner: windows-latest

                    - architecture: x86-64
                      container: "null"
                      display_architecture: x86_64
                      display_os: macOS
                      downdoc_architecture: x64
                      downdoc_binary_suffix: ""
                      downdoc_os: macos
                      os: macos
                      runner: macos-15-intel

                    - architecture: arm64
                      container: "{\"image\": \"quay.io/pypa/manylinux_2_28_aarch64\"}"
                      display_architecture: arm64
                      display_os: Linux
                      downdoc_architecture: arm64
                      downdoc_binary_suffix: ""
                      downdoc_os: linux
                      os: linux
                      runner: ubuntu-24.04-arm

                    - architecture: arm64
                      container: "null"
                      display_architecture: arm64
                      display_os: macOS
                      downdoc_architecture: arm64
                      downdoc_binary_suffix: ""
                      downdoc_os: macos
                      os: macos
                      runner: macos-latest

        steps:
            - id: checkout-upstream-repository
              uses: actions/checkout@v7
              with:
                persist-credentials: false
                ref: v1.1.0-stable
                repository: opendevise/downdoc

            - id: restore-binary-from-cache
              uses: actions/cache@v6
              with:
                key: downdoc-${{matrix.os}}-${{matrix.architecture}}|${{steps.checkout-upstream-repository.outputs.ref}}
                path: Pydowndoc-bin/downloads/downdoc-${{matrix.os}}-${{matrix.architecture}}${{matrix.downdoc_binary_suffix}}

            - if: steps.restore-binary-from-cache.outputs.cache-hit != 'true'
              uses: actions/setup-node@v6
              with:
                node-version: 24

            - if: steps.restore-binary-from-cache.outputs.cache-hit != 'true'
              name: Build downdoc ${{matrix.display_os}} ${{matrix.display_architecture}} binary
              run: npx pkg -t node18-${{matrix.downdoc_os}}-${{matrix.downdoc_architecture}} . --out-path
                Pydowndoc-bin/downloads  # zizmor: ignore[template-injection]

            - if: steps.restore-binary-from-cache.outputs.cache-hit != 'true'
              name: Rename built downdoc executable binary
              run: mv Pydowndoc-bin/downloads/downdoc${{matrix.downdoc_binary_suffix}} Pydowndoc-bin/downloads/downdoc-${{matrix.os}}-${{matrix.architecture}}${{matrix.downdoc_binary_suffix}}  # zizmor: ignore[template-injection]

            - uses: actions/upload-artifact@v7
              with:
                if-no-files-found: error
                name: downdoc-${{matrix.os}}-${{matrix.architecture}}-binary
                path: Pydowndoc-bin/downloads/downdoc-${{matrix.os}}-${{matrix.architecture}}${{matrix.downdoc_binary_suffix}}  # zizmor: ignore[template-injection]
