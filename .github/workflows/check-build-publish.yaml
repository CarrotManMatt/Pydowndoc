name: Lint, type-check, test, build and publish package

"on":
    pull_request:
        branches: [main]
    push:
        branches: [main]
        tags: [v*]

concurrency:  # yamllint disable-line rule:key-ordering
    cancel-in-progress: true
    group: ${{github.workflow}}-${{github.event.pull_request.number || github.ref}}

permissions:
    contents: read

jobs:
    upload-downdoc-binaries:
        uses: ./.github/workflows/upload-downdoc-binaries.yaml

    uv-check:
        env:
            SKIP_MISSING_DOWNDOC: "True"
        name: Validate uv lockfile
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                fetch-depth: 0
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Check uv.lock (ensure all dependencies up to date)
              run: uv lock --check

    flake8:  # yamllint disable-line rule:key-ordering
        env:
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Lint code with Flake8
        needs: [uv-check]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Install Flake8 from locked dependencies
              run: uv sync --only-group lint-format

            - name: Run Flake8
              run: uv run -- flake8

    mypy:  # yamllint disable-line rule:key-ordering
        env:
            SKIP_MISSING_DOWNDOC: "True"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Type-check code with mypy
        needs: [uv-check]
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                component: [package, scripts]
                python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
                exclude:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                include:  # yamllint disable-line rule:key-ordering
                    - component: scripts
                      python-version: ""

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - if: matrix.component == 'package'
              name: Set up Python (using matrix version)
              uses: actions/setup-python@v6
              with:
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Set up Python (using `.python-version` File)
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - if: matrix.component == 'package'
              name: Install uv (with matrix Python version)
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true
                python-version: ${{matrix.python-version}}

            - if: matrix.component == 'scripts'
              name: Install uv (with `.python-version` file)
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Install mypy from locked dependencies
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    ARGS=("--no-group" "dev" "--group" "type-check")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    ARGS=("--only-group" "type-check" "--only-group" "build-dev")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                uv sync "${ARGS[@]}"

            - id: store-hashed-python-version
              name: Store hashed Python version
              run: echo "hashed_python_version=$(uv run -- python -VV | sha256sum | cut -d' ' -f1)"
                >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v6
              with:
                key: mypy|${{steps.store-hashed-python-version.outputs.hashed_python_version}}|${{matrix.component}}
                path: ./.mypy_cache

            - name: Run mypy
              run: |  # zizmor: ignore[template-injection]
                if [ "${{matrix.component}}" == "package" ]; then
                    FILES=("pydowndoc/")
                elif [ "${{matrix.component}}" == "scripts" ]; then
                    FILES=("hatch_build.py" "Pydowndoc-bin/hatch_build.py")
                else
                    echo "Error: Unknown matrix.component value: '${{matrix.component}}'" >&2
                    exit 1
                fi

                for FILE in "${FILES[@]}"; do
                  uv run -- mypy "$FILE"
                done

    pre-commit-PUSH:  # yamllint disable-line rule:key-ordering
        if: github.event_name == 'push'

        name: Verify pre-commit hooks (push)
        uses: ./.github/workflows/autofix-pre-commit.yaml
        with:
            skip-autofix: true

    pre-commit-PULL_REQUEST:  # yamllint disable-line rule:key-ordering
        if: github.event_name == 'pull_request'

        name: Verify pre-commit hooks and commit auto-fixes (pull_request)
        runs-on: ubuntu-latest

        steps:
            - timeout-minutes: 15
              uses: kachick/wait-other-jobs@v4.0.0
              with:
                skip-same-workflow: true
                wait-list: |
                    [
                        {
                            "workflowFile": "autofix-pre-commit.yaml",
                            "jobMatchMode": "prefix",
                            "jobName": "Run pre-commit hooks"
                        }
                    ]

    ruff-lint:  # yamllint disable-line rule:key-ordering
        env:
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never
        name: Lint code with ruff
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Install ruff from locked dependencies
              run: uv sync --only-group lint-format

            - id: store-hashed-python-version
              name: Store hashed Python version
              run: echo "hashed_python_version=$(uv run -- python -VV | sha256sum | cut -d' ' -f1)"
                >> "$GITHUB_OUTPUT"

            - uses: actions/cache@v6
              with:
                key: ruff|${{steps.store-hashed-python-version.outputs.hashed_python_version}}
                path: ./.ruff_cache

            - name: Run ruff check
              run: uv run -- ruff check --no-fix --output-format=github

    build-pydowndoc-bin:  # yamllint disable-line rule:key-ordering
        container: ${{fromJSON(matrix.container)}}
        env:
            SKIP_MISSING_DOWNDOC: "False"
            UV_FROZEN: true
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never

        if: |
            always()
            && needs.flake8.result == 'success'
            && needs.mypy.result =='success'
            && (
                needs.pre-commit-PUSH.result == 'success'
                || needs.pre-commit-PULL_REQUEST.result == 'success'
            )
            && needs.ruff-lint.result == 'success'
            && needs.upload-downdoc-binaries.result == 'success'

        name: Build ${{matrix.display_os}} ${{matrix.display_architecture}} `Pydowndoc-bin` package
        needs: [flake8, mypy, pre-commit-PUSH, pre-commit-PULL_REQUEST, ruff-lint, upload-downdoc-binaries]
        runs-on: ${{matrix.runner}}

        strategy:
            matrix:
                include:
                    - architecture: x86-64
                      auditwheel_architecture: x86_64
                      container: "{\"image\": \"quay.io/pypa/manylinux_2_28_x86_64\"}"
                      display_architecture: x86_64
                      display_os: Linux
                      os: linux
                      runner: ubuntu-latest

                    - architecture: x86-64
                      container: "null"
                      display_architecture: x86_64
                      display_os: Windows
                      os: windows
                      runner: windows-latest

                    - architecture: x86-64
                      container: "null"
                      display_architecture: x86_64
                      display_os: macOS
                      os: macos
                      runner: macos-15-intel

                    - architecture: arm64
                      auditwheel_architecture: aarch64
                      container: "{\"image\": \"quay.io/pypa/manylinux_2_28_aarch64\"}"
                      display_architecture: arm64
                      display_os: Linux
                      os: linux
                      runner: ubuntu-24.04-arm

                    - architecture: arm64
                      container: "null"
                      display_architecture: arm64
                      display_os: macOS
                      os: macos
                      runner: macos-latest

        steps:
            - uses: actions/checkout@v7
              with:
                fetch-depth: 0
                persist-credentials: false

            - if: "!contains(matrix.container, 'pypa/manylinux')"
              name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - if: "!contains(matrix.container, 'pypa/manylinux')"
              name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Download ${{matrix.display_os}} ${{matrix.display_architecture}} downdoc binary
                executable
              uses: actions/download-artifact@v8
              with:
                name: downdoc-${{matrix.os}}-${{matrix.architecture}}-binary
                path: Pydowndoc-bin/downloads/

            - name: Install build dependencies from lock file
              run: uv sync --only-group build

            - name: Build ${{matrix.display_os}} ${{matrix.display_architecture}} package wheel
              run: uv run --directory Pydowndoc-bin -- hatch build -t custom

            - if: matrix.os == 'linux'
              name: Repair ${{matrix.display_os}} ${{matrix.display_architecture}} package
              run: uv run --no-project -- auditwheel repair "$(find Pydowndoc-bin/dist/ -type f -iname
                "*${{matrix.os}}_${{matrix.auditwheel_architecture}}.whl")" -w Pydowndoc-bin/dist  # zizmor: ignore[template-injection]

            - if: matrix.os == 'linux'
              name: Remove unrepaired ${{matrix.display_os}} ${{matrix.display_architecture}} package
              run: rm Pydowndoc-bin/dist/*-${{matrix.os}}_${{matrix.auditwheel_architecture}}.whl  # zizmor: ignore[template-injection]

            - name: Save build artifacts
              uses: actions/upload-artifact@v7
              with:
                name: built-pydowndoc-bin-${{matrix.os}}-${{matrix.architecture}}-package
                path: Pydowndoc-bin/dist/

    build-pydowndoc:  # yamllint disable-line rule:key-ordering
        env:
            SKIP_MISSING_DOWNDOC: "False"
            UV_NO_SYNC: true
            UV_PYTHON_DOWNLOADS: never

        if: |
            always()
            && needs.flake8.result == 'success'
            && needs.mypy.result =='success'
            && (
                needs.pre-commit-PUSH.result == 'success'
                || needs.pre-commit-PULL_REQUEST.result == 'success'
            )
            && needs.ruff-lint.result == 'success'
            && needs.uv-check.result == 'success'
            && needs.upload-downdoc-binaries.result == 'success'

        name: Build `Pydowndoc` package
        needs: [flake8, mypy, pre-commit-PUSH, pre-commit-PULL_REQUEST, ruff-lint, uv-check, upload-downdoc-binaries]
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                fetch-depth: 0
                persist-credentials: false

            - name: Download Linux x86_64 downdoc executable binary
              uses: actions/download-artifact@v8
              with:
                name: downdoc-linux-x86-64-binary
                path: ~/.local/bin/

            - name: Set executable permissions on Linux x86_64 downdoc executable binary
              run: mv ~/.local/bin/downdoc-linux-x86-64 ~/.local/bin/downdoc && chmod +x ~/.local/bin/downdoc

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                python-version-file: .python-version

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Build package
              run: uv build --build --no-sources

            - name: Save build artifacts
              uses: actions/upload-artifact@v7
              with:
                name: built-pydowndoc-package
                path: dist/

    publish:  # yamllint disable-line rule:key-ordering
        environment: publish

        if: |
            always()
            && github.ref_type == 'tag'
            && needs.build-pydowndoc.result == 'success'
            && needs.build-pydowndoc-bin.result == 'success'

        name: Publish built package to PyPI
        needs: [build-pydowndoc, build-pydowndoc-bin]
        permissions:
            id-token: write  # Needed to authenticate to PyPI
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Download `Pydowndoc` build artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: dist/
                pattern: built-pydowndoc-package

            - name: Download `Pydowndoc-bin` build artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: dist/
                pattern: built-pydowndoc-bin-*-package

            - name: Publish to PyPI
              run: uv publish

    test-publish:  # yamllint disable-line rule:key-ordering
        environment: test-publish

        if: |
            always()
            && github.ref_type != 'tag'
            && github.event_name != 'pull_request'
            && needs.build-pydowndoc.result == 'success'
            && needs.build-pydowndoc-bin.result == 'success'

        name: Publish built package to Test-PyPI
        needs: [build-pydowndoc, build-pydowndoc-bin]
        permissions:
            id-token: write  # Needed to authenticate to Test-PyPI
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7
              with:
                persist-credentials: false

            - name: Install uv
              uses: astral-sh/setup-uv@v8.3.2
              with:
                enable-cache: true

            - name: Download `Pydowndoc` build artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: dist/
                pattern: built-pydowndoc-package

            - name: Download `Pydowndoc-bin` build artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: dist/
                pattern: built-pydowndoc-bin-*-package

            - name: Publish to Test-PyPI
              run: uv publish --index Test-PyPI

    release:  # yamllint disable-line rule:key-ordering
        if: always() && github.ref_type == 'tag' && needs.publish.result == 'success'

        name: Create an online GitHub release
        needs: [publish]
        permissions:
            contents: write  # Needed to create a release in the GitHub repository
            id-token: write  # Needed to authenticate to GitHub API
        runs-on: ubuntu-latest

        steps:
            - name: Download `Pydowndoc` build artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: dist/
                pattern: built-pydowndoc-package

            - name: Download `Pydowndoc-bin` build artifacts
              uses: actions/download-artifact@v8
              with:
                merge-multiple: true
                path: dist/
                pattern: built-pydowndoc-bin-*-package

            - name: Sign build artifacts
              uses: sigstore/gh-action-sigstore-python@v3.4.0
              with:
                inputs: ./dist/pydowndoc-*.whl ./dist/pydowndoc-*.tar.gz

            - name: Create GitHub release
              env:  # yamllint disable-line rule:key-ordering
                GITHUB_TOKEN: ${{github.token}}
                RELEASE_REPOSITORY: ${{github.repository}}
                RELEASE_TAG: ${{github.ref_name}}
              run: gh release create "${RELEASE_TAG}" dist/** --repo "${RELEASE_REPOSITORY}" --verify-tag
                --generate-notes
